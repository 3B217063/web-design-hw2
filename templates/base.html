<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}會員系統{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="container">
        <nav>
            <ul>
                <li>
                    <strong>
                        <a href="{{ url_for('index') }}" class="site-logo">📋 會員系統</a>
                    </strong>
                </li>
            </ul>
            <ul>
                <li><a href="{{ url_for('index') }}">首頁</a></li>
                <li><a href="{{ url_for('login') }}">登入</a></li>
                <li><a href="{{ url_for('register') }}">註冊</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small>1132 Web 程式設計 - 第 2 次小考</small>
    </footer>
</body>
</html>
