{% extends "base.html" %}
{% block title %}歡迎 - {{ user.username }}{% endblock %}

{% block content %}
<h1>歡迎，{{ user.username }}！🎉</h1>

<table>
    <thead>
        <tr>
            <th>欄位</th>
            <th>內容</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Email</td>
            <td>{{ user.email }}</td>
        </tr>
        <tr>
            <td>電話</td>
            <td>{{ user.phone | mask_phone }}</td>
        </tr>
        <tr>
            <td>出生日期</td>
            <td>{{ user.birthdate | format_tw_date }}</td>
        </tr>
    </tbody>
</table>

<div class="action-group">
    <a href="{{ url_for('users') }}" role="button">查看會員清單</a>
    <a href="{{ url_for('index') }}" role="button" class="secondary">返回首頁</a>
</div>
{% endblock %}
